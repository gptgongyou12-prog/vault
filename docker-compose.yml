services:
  vault-server:
    image: vault-local
    container_name: vault-server
    restart: unless-stopped
    ports:
      - "${HOST_PORT:-8080}:8080"
    environment:
      - PORT=8080
      - DATA_DIR=/app/data
      - FILES_DIR=/app/storage/files
      - JWT_SECRET=${JWT_SECRET}
      - SIGNED_URL_SECRET=${SIGNED_URL_SECRET}
      - TOKEN_PEPPER=${TOKEN_PEPPER}
      - ACCESS_TOKEN_TTL=${ACCESS_TOKEN_TTL:-15m}
      - REFRESH_TOKEN_TTL=${REFRESH_TOKEN_TTL:-720h}
      - SIGNED_URL_TTL=${SIGNED_URL_TTL:-4h}
      - LOG_LEVEL=${LOG_LEVEL:-warn}
      - VAPID_PUBLIC_KEY=${VAPID_PUBLIC_KEY}
      - VAPID_PRIVATE_KEY=${VAPID_PRIVATE_KEY}
    volumes:
      - /mnt/vault-usb/vault-data:/app/data
      - /mnt/vault-storage:/app/storage
      - /home/lee/scripts:/home/lee/scripts:ro
      - /home/lee/logs:/home/lee/logs
    healthcheck:
      test:
        [
          "CMD",
          "wget",
          "--no-verbose",
          "--tries=1",
          "--spider",
          "http://localhost:8080/api/health",
        ]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 10s
    networks:
      - vault-network

networks:
  vault-network:
    driver: bridge
